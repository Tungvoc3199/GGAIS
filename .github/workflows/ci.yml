name: CI
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies clean
        run: npm ci
      - name: Verify lint, build and static security
        run: npm run verify
