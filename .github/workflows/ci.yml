name: CI
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: TypeScript check
        run: npm run lint
      - name: Production build
        run: npm run build
