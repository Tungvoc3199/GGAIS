name: Deploy Firebase Rules

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-firebase-rules.yml'

permissions:
  contents: read

concurrency:
  group: deploy-firebase-rules-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify lint, build and static security
        run: npm run verify

      - name: Authenticate Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_FIREBASE_SERVICE_ACCOUNT }}'
          project_id: 'lich-hoc-pro-production'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Deploy Firebase Rules
        run: firebase deploy --only firestore:rules,storage --project lich-hoc-pro-production --non-interactive
