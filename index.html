<!doctype html>
<html lang="vi-VN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QLHV - Lịch Học Pro</title>
    <style>
      input[data-lhp-time24="true"] {
        cursor: pointer;
        letter-spacing: 0.03em;
      }

      #lhp-time24-popover {
        position: fixed;
        z-index: 2147483647;
        min-width: 280px;
        max-width: calc(100vw - 28px);
        border-radius: 20px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.24);
        padding: 14px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .lhp-time24-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
        color: #0f172a;
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .lhp-time24-title button {
        border: 0;
        background: transparent;
        color: #94a3b8;
        font-size: 20px;
        cursor: pointer;
        line-height: 1;
      }

      .lhp-time24-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .lhp-time24-grid label {
        display: block;
        margin-bottom: 6px;
        color: #64748b;
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .lhp-time24-grid select {
        width: 100%;
        height: 46px;
        border-radius: 14px;
        border: 1px solid #dbe3ef;
        background: #f8fafc;
        color: #0f172a;
        font-size: 18px;
        font-weight: 900;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        text-align: center;
        padding: 0 10px;
      }

      .lhp-time24-preview {
        margin-top: 12px;
        border-radius: 16px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        color: #1d4ed8;
        font-size: 24px;
        font-weight: 1000;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        text-align: center;
        padding: 10px 12px;
      }

      .lhp-time24-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 12px;
      }

      .lhp-time24-actions button {
        border: 0;
        border-radius: 14px;
        padding: 10px 16px;
        font-size: 12px;
        font-weight: 900;
        cursor: pointer;
      }

      .lhp-time24-cancel {
        background: #f1f5f9;
        color: #475569;
      }

      .lhp-time24-ok {
        background: #2563eb;
        color: #ffffff;
        box-shadow: 0 10px 22px rgba(37, 99, 235, 0.26);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const pad2 = (value) => String(value).padStart(2, '0');
        let activeInput = null;
        let popover = null;
        let hourSelect = null;
        let minuteSelect = null;
        let preview = null;

        const readTime = (input) => {
          const raw = String(input?.value || '').trim();
          const match = raw.match(/^(\d{1,2}):(\d{2})$/);
          if (!match) return { hour: '08', minute: '00' };
          const h = Math.max(0, Math.min(23, Number(match[1])));
          const m = Math.max(0, Math.min(59, Number(match[2])));
          return { hour: pad2(h), minute: pad2(m) };
        };

        const setNativeValue = (input, value) => {
          const descriptor = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value');
          if (descriptor && descriptor.set) descriptor.set.call(input, value);
          else input.value = value;
          input.dispatchEvent(new Event('input', { bubbles: true }));
          input.dispatchEvent(new Event('change', { bubbles: true }));
        };

        const updatePreview = () => {
          if (!preview || !hourSelect || !minuteSelect) return;
          preview.textContent = `${hourSelect.value}:${minuteSelect.value}`;
        };

        const closePopover = () => {
          if (popover) popover.remove();
          popover = null;
          activeInput = null;
        };

        const createOptions = (select, max, step = 1) => {
          select.innerHTML = '';
          for (let i = 0; i <= max; i += step) {
            const option = document.createElement('option');
            option.value = pad2(i);
            option.textContent = pad2(i);
            select.appendChild(option);
          }
        };

        const positionPopover = (input) => {
          if (!popover || !input) return;
          const rect = input.getBoundingClientRect();
          const margin = 10;
          const desiredTop = rect.bottom + 8;
          const maxLeft = window.innerWidth - popover.offsetWidth - margin;
          const left = Math.max(margin, Math.min(rect.left, maxLeft));
          const belowFits = desiredTop + popover.offsetHeight < window.innerHeight - margin;
          const top = belowFits ? desiredTop : Math.max(margin, rect.top - popover.offsetHeight - 8);
          popover.style.left = `${left}px`;
          popover.style.top = `${top}px`;
        };

        const showPopover = (input) => {
          activeInput = input;
          closePopover();
          activeInput = input;
          const current = readTime(input);

          popover = document.createElement('div');
          popover.id = 'lhp-time24-popover';
          popover.innerHTML = `
            <div class="lhp-time24-title">
              <span>Chọn giờ 24h</span>
              <button type="button" aria-label="Đóng">×</button>
            </div>
            <div class="lhp-time24-grid">
              <div>
                <label>Giờ</label>
                <select data-part="hour"></select>
              </div>
              <div>
                <label>Phút</label>
                <select data-part="minute"></select>
              </div>
            </div>
            <div class="lhp-time24-preview"></div>
            <div class="lhp-time24-actions">
              <button type="button" class="lhp-time24-cancel">Hủy</button>
              <button type="button" class="lhp-time24-ok">OK</button>
            </div>
          `;

          document.body.appendChild(popover);
          hourSelect = popover.querySelector('select[data-part="hour"]');
          minuteSelect = popover.querySelector('select[data-part="minute"]');
          preview = popover.querySelector('.lhp-time24-preview');

          createOptions(hourSelect, 23, 1);
          createOptions(minuteSelect, 55, 5);

          hourSelect.value = current.hour;
          const roundedMinute = pad2(Math.round(Number(current.minute) / 5) * 5).replace('60', '55');
          minuteSelect.value = roundedMinute;
          if (!minuteSelect.value) minuteSelect.value = '00';
          updatePreview();

          hourSelect.addEventListener('change', updatePreview);
          minuteSelect.addEventListener('change', updatePreview);
          popover.querySelector('.lhp-time24-title button').addEventListener('click', closePopover);
          popover.querySelector('.lhp-time24-cancel').addEventListener('click', closePopover);
          popover.querySelector('.lhp-time24-ok').addEventListener('click', () => {
            if (activeInput) setNativeValue(activeInput, `${hourSelect.value}:${minuteSelect.value}`);
            closePopover();
          });

          requestAnimationFrame(() => positionPopover(input));
        };

        const enhanceTimeInputs = () => {
          document.querySelectorAll('input[type="time"]:not([data-lhp-time24="true"])').forEach((input) => {
            input.dataset.lhpOriginalType = 'time';
            input.dataset.lhpTime24 = 'true';
            try { input.type = 'text'; } catch {}
            input.readOnly = true;
            input.inputMode = 'numeric';
            input.placeholder = 'HH:mm';
            input.setAttribute('aria-label', input.getAttribute('aria-label') || 'Chọn giờ 24h');
            input.addEventListener('mousedown', (event) => {
              event.preventDefault();
              showPopover(input);
            });
            input.addEventListener('click', (event) => {
              event.preventDefault();
              showPopover(input);
            });
            input.addEventListener('focus', () => showPopover(input));
          });
        };

        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') closePopover();
        });
        window.addEventListener('resize', () => positionPopover(activeInput));
        window.addEventListener('scroll', () => positionPopover(activeInput), true);
        document.addEventListener('mousedown', (event) => {
          if (!popover) return;
          if (popover.contains(event.target)) return;
          if (activeInput && activeInput.contains && activeInput.contains(event.target)) return;
          closePopover();
        }, true);

        const observer = new MutationObserver(enhanceTimeInputs);
        observer.observe(document.documentElement, { childList: true, subtree: true });
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', enhanceTimeInputs);
        } else {
          enhanceTimeInputs();
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
