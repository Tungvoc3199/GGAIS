<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QLHV - Lịch học Pro</title>
    <style>
      #lhp-toast-root {
        position: fixed;
        right: 18px;
        top: 18px;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: min(420px, calc(100vw - 28px));
        pointer-events: none;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .lhp-toast {
        pointer-events: auto;
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        background: #ffffff;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
        padding: 14px 14px 14px 16px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: start;
        animation: lhp-toast-in 180ms ease-out;
      }

      .lhp-toast strong {
        display: block;
        font-size: 12px;
        line-height: 1.2;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 4px;
      }

      .lhp-toast span {
        display: block;
        font-size: 13px;
        line-height: 1.45;
        font-weight: 700;
        color: #334155;
      }

      .lhp-toast button {
        border: 0;
        background: transparent;
        color: #94a3b8;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        padding: 0 2px;
      }

      .lhp-toast-success {
        border-color: #a7f3d0;
        background: #ecfdf5;
      }

      .lhp-toast-success strong {
        color: #047857;
      }

      .lhp-toast-error {
        border-color: #fecaca;
        background: #fef2f2;
      }

      .lhp-toast-error strong {
        color: #dc2626;
      }

      .lhp-toast-warning {
        border-color: #fde68a;
        background: #fffbeb;
      }

      .lhp-toast-warning strong {
        color: #d97706;
      }

      @keyframes lhp-toast-in {
        from {
          opacity: 0;
          transform: translateY(-8px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const ensureToastRoot = () => {
          let root = document.getElementById('lhp-toast-root');
          if (!root) {
            root = document.createElement('div');
            root.id = 'lhp-toast-root';
            document.body.appendChild(root);
          }
          return root;
        };

        const getToastType = (message) => {
          const text = String(message || '').toLowerCase();
          if (
            text.includes('lỗi') ||
            text.includes('thất bại') ||
            text.includes('không thể') ||
            text.includes('từ chối') ||
            text.includes('bị khóa') ||
            text.includes('server_') ||
            text.includes('permission') ||
            text.includes('không có quyền')
          ) {
            return 'error';
          }
          if (
            text.includes('đã hoàn tất') ||
            text.includes('đã có biên lai') ||
            text.includes('trước đó') ||
            text.includes('vui lòng') ||
            text.includes('chưa') ||
            text.includes('quá hạn')
          ) {
            return 'warning';
          }
          return 'success';
        };

        const getToastTitle = (type) => {
          if (type === 'error') return 'Có lỗi cần xử lý';
          if (type === 'warning') return 'Cần kiểm tra lại';
          return 'Thao tác thành công';
        };

        window.__lhpToast = (message, explicitType) => {
          const root = ensureToastRoot();
          const type = explicitType || getToastType(message);
          const toast = document.createElement('div');
          toast.className = `lhp-toast lhp-toast-${type}`;
          toast.setAttribute('role', type === 'error' ? 'alert' : 'status');

          const body = document.createElement('div');
          const title = document.createElement('strong');
          title.textContent = getToastTitle(type);
          const text = document.createElement('span');
          text.textContent = String(message || 'Đã xử lý xong.');
          body.appendChild(title);
          body.appendChild(text);

          const close = document.createElement('button');
          close.type = 'button';
          close.setAttribute('aria-label', 'Đóng thông báo');
          close.textContent = '×';
          close.onclick = () => toast.remove();

          toast.appendChild(body);
          toast.appendChild(close);
          root.appendChild(toast);

          const timeoutMs = type === 'error' ? 7000 : 4500;
          window.setTimeout(() => toast.remove(), timeoutMs);
        };

        window.alert = (message) => {
          window.__lhpToast(message);
        };

        const isLessonBookingForm = (form) => {
          const text = (form?.textContent || '').toLowerCase();
          return text.includes('học viên *') &&
            text.includes('giảng viên *') &&
            text.includes('xe tập lái *') &&
            text.includes('ghi lại lịch dạy');
        };

        const getRealSelectValue = (select) => {
          if (!select) return '';
          const selected = select.options && select.selectedIndex >= 0 ? select.options[select.selectedIndex] : null;
          if (selected && selected.value) return selected.value;
          const firstRealOption = Array.from(select.options || []).find((opt) => !opt.disabled && opt.value);
          return firstRealOption ? firstRealOption.value : '';
        };

        const forceReactSelectValue = (select, value) => {
          if (!select || !value) return;
          const descriptor = Object.getOwnPropertyDescriptor(window.HTMLSelectElement.prototype, 'value');
          if (descriptor && descriptor.set) descriptor.set.call(select, value);
          else select.value = value;
          select.dispatchEvent(new Event('input', { bubbles: true }));
          select.dispatchEvent(new Event('change', { bubbles: true }));
        };

        const syncBookingSelects = (form) => {
          if (!form || !isLessonBookingForm(form)) return false;
          const selects = Array.from(form.querySelectorAll('select')).slice(0, 3);
          let touched = false;
          selects.forEach((select) => {
            const realValue = getRealSelectValue(select);
            if (realValue) {
              forceReactSelectValue(select, realValue);
              touched = true;
            }
          });
          return touched;
        };

        document.addEventListener('click', (event) => {
          const target = event.target;
          const button = target && target.closest ? target.closest('button') : null;
          if (!button || String(button.textContent || '').toLowerCase().indexOf('ghi lại lịch dạy') === -1) return;
          syncBookingSelects(button.closest('form'));
        }, true);

        document.addEventListener('submit', (event) => {
          const form = event.target;
          if (!isLessonBookingForm(form)) return;

          const now = Date.now();
          const lastSyncAt = Number(form.dataset.lhpSelectSyncAt || '0');
          if (now - lastSyncAt < 1200) return;

          event.preventDefault();
          event.stopImmediatePropagation();
          form.dataset.lhpSelectSyncAt = String(now);
          syncBookingSelects(form);
          window.__lhpToast('Đang đồng bộ đúng mã học viên, giảng viên và xe trước khi lưu lịch...', 'success');

          window.setTimeout(() => {
            const submitButton = Array.from(form.querySelectorAll('button')).find((btn) => String(btn.textContent || '').toLowerCase().includes('ghi lại lịch dạy'));
            if (form.requestSubmit && submitButton) form.requestSubmit(submitButton);
            else if (form.requestSubmit) form.requestSubmit();
          }, 250);
        }, true);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
